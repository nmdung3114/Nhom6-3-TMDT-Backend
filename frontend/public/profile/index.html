<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài khoản của tôi - ELearnVN</title>
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/footer.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/card.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/pages-combined.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <nav id="navbar" class="navbar"><div class="container navbar__inner" id="navbar-inner"></div></nav>

  <div class="profile-page page-wrapper">
    <div class="container" style="padding-top:40px;padding-bottom:60px">
      <div class="profile-layout">
        <!-- Sidebar -->
        <aside class="profile-sidebar">
          <div class="profile-avatar-wrap">
            <div id="profile-avatar-letter" class="profile-avatar">U</div>
            <div id="profile-name" class="profile-name">Đang tải...</div>
            <div id="profile-email" class="profile-email">--</div>
          </div>
          <nav class="profile-nav">
            <div class="profile-nav-item active" id="nav-my-courses" data-tab="my-courses">
              🎓 Khóa học của tôi
            </div>
            <div class="profile-nav-item" id="nav-profile-info" data-tab="profile-info">
              👤 Thông tin cá nhân
            </div>
            <div class="profile-nav-item" id="nav-change-password" data-tab="change-password">
              🔒 Đổi mật khẩu
            </div>
            <div class="profile-nav-item" id="nav-my-orders" data-tab="my-orders">
              📦 Đơn hàng gần đây
            </div>
            <div class="divider"></div>
            <div class="profile-nav-item" style="color:var(--color-error)" onclick="app.logout()">
              🚪 Đăng xuất
            </div>
          </nav>
        </aside>

        <!-- Content -->
        <div>
          <!-- My Courses Tab -->
          <div id="tab-my-courses" class="profile-section active">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
              <h2 class="profile-section__title" style="margin-bottom:0">🎓 Khóa học & Tài liệu của tôi</h2>
              <a href="/products/list.html" class="btn btn-secondary btn-sm">+ Thêm khóa học</a>
            </div>
            <div id="my-courses-grid" class="my-courses-grid">
              <div class="loading-overlay"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- Profile Info Tab -->
          <div id="tab-profile-info" class="profile-section">
            <h2 class="profile-section__title">👤 Thông tin cá nhân</h2>
            <form id="profile-form">
              <div class="form-group">
                <label class="form-label">Họ và tên</label>
                <div class="input-wrapper">
                  <span class="input-icon">👤</span>
                  <input id="info-name" type="text" class="form-control" placeholder="Nguyễn Văn A">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <div class="input-wrapper">
                  <span class="input-icon">📧</span>
                  <input id="info-email" type="email" class="form-control" disabled style="opacity:0.6">
                </div>
                <div class="form-hint">Email không thể thay đổi</div>
              </div>
              <div class="form-group">
                <label class="form-label">Số điện thoại</label>
                <div class="input-wrapper">
                  <span class="input-icon">📱</span>
                  <input id="info-phone" type="tel" class="form-control" placeholder="0901234567">
                </div>
              </div>
              <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
            </form>
          </div>

          <!-- Change Password Tab -->
          <div id="tab-change-password" class="profile-section">
            <h2 class="profile-section__title">🔒 Đổi mật khẩu</h2>
            <form id="password-form" style="max-width:460px">
              <div class="form-group">
                <label class="form-label">Mật khẩu hiện tại <span class="required">*</span></label>
                <div class="input-wrapper">
                  <span class="input-icon">🔐</span>
                  <input id="current-password" type="password" class="form-control" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Mật khẩu mới <span class="required">*</span></label>
                <div class="input-wrapper">
                  <span class="input-icon">🔒</span>
                  <input id="new-password" type="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Xác nhận mật khẩu mới <span class="required">*</span></label>
                <div class="input-wrapper">
                  <span class="input-icon">🔒</span>
                  <input id="confirm-password" type="password" class="form-control" required>
                </div>
              </div>
              <button type="submit" class="btn btn-primary">Đổi mật khẩu</button>
            </form>
          </div>

          <!-- My Orders Tab -->
          <div id="tab-my-orders" class="profile-section">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
              <h2 class="profile-section__title" style="margin-bottom:0">📦 Đơn hàng gần đây</h2>
              <a href="/orders/index.html" class="btn btn-secondary btn-sm">Xem tất cả →</a>
            </div>
            <div id="my-orders-list">
              <div class="loading-overlay"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer" id="site-footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/profile-page.js"></script>
</body>
</html>
