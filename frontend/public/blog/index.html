<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog cộng đồng - ELearnVN</title>
  <meta name="description" content="Khám phá và chia sẻ kiến thức cùng cộng đồng học tập ELearnVN — Bài viết chất lượng từ giảng viên và học viên">
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/pages/blog.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <nav class="navbar" id="navbar">
    <div class="navbar-inner" id="navbar-inner"></div>
  </nav>

  <!-- Hero -->
  <section class="blog-hero">
    <div class="blog-hero__icon">✍️</div>
    <h1 class="blog-hero__title">Blog cộng đồng</h1>
    <p class="blog-hero__subtitle">Khám phá chia sẻ kiến thức từ cộng đồng học viên và giảng viên ELearnVN</p>
    <div class="blog-hero__actions">
      <a href="/blog/create.html" class="btn btn-primary" id="btn-write" style="display:none">
        ✏️ Viết bài mới
      </a>
    </div>
  </section>

  <main class="blog-page">
    <div class="blog-container">

      <!-- Toolbar -->
      <div class="blog-toolbar">
        <div class="blog-search">
          <span class="blog-search__icon">🔍</span>
          <input type="text" id="search-input" placeholder="Tìm kiếm bài viết..." autocomplete="off">
          <button class="blog-search__btn" id="btn-search">Tìm</button>
        </div>
      </div>

      <!-- Post Grid -->
      <div id="blog-list" class="blog-list">
        <!-- Loading skeletons -->
        <div class="post-card" style="pointer-events:none">
          <div class="post-card__cover"><div class="skeleton" style="width:100%;height:100%"></div></div>
          <div class="post-card__body">
            <div class="skeleton" style="height:18px;margin-bottom:12px;border-radius:8px"></div>
            <div class="skeleton" style="height:14px;width:80%;margin-bottom:8px;border-radius:6px"></div>
            <div class="skeleton" style="height:14px;width:60%;border-radius:6px"></div>
          </div>
        </div>
        <div class="post-card" style="pointer-events:none">
          <div class="post-card__cover"><div class="skeleton" style="width:100%;height:100%"></div></div>
          <div class="post-card__body">
            <div class="skeleton" style="height:18px;margin-bottom:12px;border-radius:8px"></div>
            <div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;border-radius:6px"></div>
            <div class="skeleton" style="height:14px;width:55%;border-radius:6px"></div>
          </div>
        </div>
        <div class="post-card" style="pointer-events:none">
          <div class="post-card__cover"><div class="skeleton" style="width:100%;height:100%"></div></div>
          <div class="post-card__body">
            <div class="skeleton" style="height:18px;margin-bottom:12px;border-radius:8px"></div>
            <div class="skeleton" style="height:14px;width:70%;margin-bottom:8px;border-radius:6px"></div>
            <div class="skeleton" style="height:14px;width:50%;border-radius:6px"></div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div id="blog-pagination" class="blog-pagination"></div>
    </div>
  </main>

  <div id="footer-root"></div>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/blog-list.js"></script>
</body>
</html>
