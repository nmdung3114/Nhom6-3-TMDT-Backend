<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - ELearnVN</title>
  <meta name="description" content="Cộng đồng học tập ELearnVN — Đọc và chia sẻ kiến thức cùng cộng đồng">
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/pages/blog.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <nav class="navbar" id="navbar"></nav>

  <main class="blog-page">
    <div class="blog-container">
      <div class="blog-header">
        <h1 class="blog-header__title">✍️ Blog cộng đồng</h1>
        <a href="/blog/create.html" class="btn btn-primary" id="btn-write" style="display:none">
          ✏️ Viết bài mới
        </a>
      </div>

      <!-- Search -->
      <div class="blog-search">
        <input type="text" id="search-input" placeholder="🔍  Tìm kiếm bài viết..." autocomplete="off">
        <button class="btn btn-secondary" id="btn-search">Tìm</button>
      </div>

      <!-- Post List -->
      <div id="blog-list" class="blog-list">
        <!-- Loading skeleton -->
        <div class="skeleton" style="height:140px;border-radius:16px"></div>
        <div class="skeleton" style="height:140px;border-radius:16px"></div>
        <div class="skeleton" style="height:140px;border-radius:16px"></div>
      </div>

      <!-- Pagination -->
      <div id="blog-pagination" class="blog-pagination"></div>
    </div>
  </main>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/blog-list.js"></script>
</body>
</html>
