<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết bài viết - ELearnVN</title>
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/pages/blog.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <nav class="navbar" id="navbar"></nav>

  <main class="blog-page">
    <div class="post-detail" id="post-detail-container">
      <!-- Back link -->
      <a href="/blog/" class="post-detail__back">← Quay lại Blog</a>

      <!-- Post content -->
      <div id="post-content">
        <div class="skeleton" style="height:48px;margin-bottom:16px;border-radius:10px"></div>
        <div class="skeleton" style="height:24px;width:60%;margin-bottom:32px;border-radius:8px"></div>
        <div class="skeleton" style="height:200px;border-radius:12px"></div>
      </div>

      <!-- Actions (owner / admin) -->
      <div id="post-actions" class="post-detail__actions" style="display:none">
        <button class="btn btn-sm btn-danger" id="btn-delete-post">🗑️ Xóa bài viết</button>
      </div>

      <!-- Comments -->
      <section class="comments-section" id="comments-section" style="display:none">
        <h2 class="comments-section__title">💬 Bình luận <span id="comment-count" style="font-size:1rem;color:var(--color-text-muted)"></span></h2>

        <!-- Comment form (shown only when logged in) -->
        <div class="comment-form" id="comment-form-wrapper" style="display:none">
          <textarea id="comment-input" placeholder="Viết bình luận của bạn... (Ctrl+Enter để gửi)"></textarea>
          <div class="comment-form__footer">
            <button class="btn btn-primary btn-sm" id="btn-submit-comment">Gửi bình luận</button>
          </div>
        </div>

        <div id="login-to-comment" style="display:none;padding:16px;text-align:center;color:var(--color-text-muted);font-size:0.9rem">
          <a href="/auth/login.html" style="color:var(--color-accent-light)">Đăng nhập</a> để tham gia bình luận
        </div>

        <!-- Comments list -->
        <div id="comments-list"></div>
      </section>
    </div>
  </main>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/blog-post.js"></script>
</body>
</html>
