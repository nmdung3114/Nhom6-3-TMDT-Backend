<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý đơn hàng - Admin ELearnVN</title>
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/card.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/pages-combined.css">
</head>
<body data-page="orders">
  <div id="toast-container" class="toast-container"></div>
  <nav class="navbar" id="navbar" style="z-index:200">
    <div class="container navbar__inner">
      <a href="/" class="navbar__brand">
        <div class="navbar__brand-icon">🎓</div>
        <span class="navbar__brand-text">ELearnVN</span>
        <span style="font-size:0.7rem;background:var(--color-error-bg);color:var(--color-error);padding:2px 8px;border-radius:4px;margin-left:4px;font-weight:700">ADMIN</span>
      </a>
      <div style="display:flex;align-items:center;gap:12px">
        <a href="/" class="btn btn-ghost btn-sm">🏠 Trang web</a>
        <button class="btn btn-secondary btn-sm" onclick="app.logout()">🚪 Đăng xuất</button>
      </div>
    </div>
  </nav>

  <div class="admin-page">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__section-title">Tổng quan</div>
      <a href="/admin/dashboard.html" class="admin-nav-item"><span class="admin-icon">📊</span> Dashboard</a>
      <div class="admin-sidebar__section-title" style="margin-top:16px">Quản lý</div>
      <a href="/admin/users.html" class="admin-nav-item"><span class="admin-icon">👥</span> Người dùng</a>
      <a href="/admin/products.html" class="admin-nav-item"><span class="admin-icon">📚</span> Sản phẩm</a>
      <a href="/admin/orders.html" class="admin-nav-item active"><span class="admin-icon">📦</span> Đơn hàng</a>
      <a href="/admin/coupons.html" class="admin-nav-item"><span class="admin-icon">🏷</span> Mã giảm giá</a>
      <div class="admin-sidebar__section-title" style="margin-top:16px">Hệ thống</div>
      <a href="/api/docs" target="_blank" class="admin-nav-item"><span class="admin-icon">📖</span> API Docs</a>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">📦 Quản lý đơn hàng</h1>
        <p class="admin-header__subtitle" id="orders-count">Đang tải...</p>
      </div>

      <!-- Filter by status -->
      <div style="display:flex;gap:12px;margin-bottom:24px;align-items:center">
        <label style="font-size:0.875rem;color:var(--color-text-secondary)">Lọc theo trạng thái:</label>
        <select id="order-status-filter" class="sort-select">
          <option value="">Tất cả</option>
          <option value="pending">⏳ Chờ thanh toán</option>
          <option value="paid">✅ Đã thanh toán</option>
          <option value="cancelled">❌ Đã hủy</option>
          <option value="refunded">↩ Đã hoàn tiền</option>
        </select>
      </div>

      <!-- Table -->
      <div class="data-table-wrap">
        <div class="data-table-header">
          <div class="data-table-title">Danh sách đơn hàng</div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Mã đơn</th>
                <th>User ID</th>
                <th>Sản phẩm</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="7" style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="data-table-footer">
          <span></span>
          <div id="orders-pagination"></div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/admin-page.js"></script>
</body>
</html>
