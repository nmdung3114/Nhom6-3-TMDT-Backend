<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - ELearnVN</title>
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/auth/login.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <main class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="auth-logo__icon">🎓</div>
        <span class="auth-logo__text">ELearnVN</span>
      </a>
      <h1 class="auth-title">Tạo tài khoản</h1>
      <p class="auth-subtitle">Bắt đầu học miễn phí hôm nay</p>

      <button class="oauth-btn" id="btn-google-login">
        <img src="https://www.google.com/favicon.ico" alt="Google"> Đăng ký với Google
      </button>
      <button class="oauth-btn" id="btn-facebook-login">
        <img src="https://www.facebook.com/favicon.ico" alt="Facebook"> Đăng ký với Facebook
      </button>

      <div class="auth-divider">hoặc điền thông tin</div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Họ tên <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input id="name" name="name" type="text" class="form-control" placeholder="Nguyễn Văn A" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Số điện thoại</label>
          <div class="input-wrapper">
            <span class="input-icon">📱</span>
            <input id="phone" name="phone" type="tel" class="form-control" placeholder="0901234567">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input id="password" name="password" type="password" class="form-control has-right-icon" placeholder="Tối thiểu 6 ký tự" required>
            <span class="input-right-icon" id="toggle-password">👁</span>
          </div>
        </div>
        <label class="checkbox-wrapper" style="margin-bottom:24px">
          <input type="checkbox" class="checkbox-input" id="agree-terms" required>
          <span class="checkbox-box"></span>
          <span class="checkbox-label">Tôi đồng ý với <a href="#" style="color:var(--color-accent-light)">Điều khoản sử dụng</a></span>
        </label>
        <button type="submit" id="btn-register" class="btn btn-primary btn-block btn-lg">Tạo tài khoản</button>
        <div id="register-error" style="display:none;margin-top:12px" class="form-error">❌ <span></span></div>
      </form>

      <div class="auth-footer">
        Đã có tài khoản? <a href="/auth/login.html">Đăng nhập</a>
      </div>
    </div>
  </main>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/auth-page.js"></script>
</body>
</html>
