<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - ELearnVN</title>
    <link rel="stylesheet" href="/css/base/reset.css" />
    <link rel="stylesheet" href="/css/base/variables.css" />
    <link rel="stylesheet" href="/css/base/base.css" />
    <link rel="stylesheet" href="/css/components/button.css" />
    <link rel="stylesheet" href="/css/components/form.css" />
    <link rel="stylesheet" href="/css/components/features.css" />
    <link rel="stylesheet" href="/css/pages/auth/login.css" />
  </head>
  <body>
    <div id="toast-container" class="toast-container"></div>
    <main class="auth-page">
      <div class="auth-card">
        <a href="/" class="auth-logo">
          <div class="auth-logo__icon">🎓</div>
          <span class="auth-logo__text">ELearnVN</span>
        </a>
        <h1 class="auth-title">Chào mừng trở lại!</h1>
        <p class="auth-subtitle">Đăng nhập để tiếp tục hành trình học tập</p>

        <div class="oauth-container">
          <!-- Google Sign-In button rendered by GSI library -->
          <div id="google-signin-container"></div>

          <button class="oauth-btn oauth-btn--facebook" id="btn-facebook-login">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="#1877F2"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M24 12.073C24 5.405 18.627 0 12 0 5.372 0 0 5.405 0 12.073c0 6.027 4.389 11.024 10.125 11.927V15.57H7.078v-3.497h3.047V9.43c0-3.025 1.793-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97H15.83c-1.491 0-1.956.93-1.956 1.886v2.25h3.328l-.532 3.497h-2.796v8.43C19.611 23.097 24 18.1 24 12.073z"
              />
            </svg>
            Tiếp tục với Facebook
          </button>
        </div>

        <div class="auth-divider">hoặc đăng nhập với email</div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="email">Địa chỉ Email <span class="required">*</span></label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input
                id="email"
                name="email"
                type="email"
                class="form-control"
                placeholder="Ví dụ: hotro@elearn.vn"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Mật khẩu <span class="required">*</span></label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input
                id="password"
                name="password"
                type="password"
                class="form-control has-right-icon"
                placeholder="Nhập mật khẩu của bạn"
                required
              />
              <span class="input-right-icon" id="toggle-password">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </div>
          </div>

          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 24px;
              margin-top: 8px;
            "
          >
            <label class="checkbox-wrapper">
              <input type="checkbox" class="checkbox-input" id="remember-me" />
              <span class="checkbox-box"></span>
              <span class="checkbox-label" style="font-size: 0.85rem">Ghi nhớ tôi</span>
            </label>
            <a
              href="#"
              style="
                font-size: 0.85rem;
                color: var(--color-accent);
                font-weight: 600;
              "
            >Quên mật khẩu?</a>
          </div>

          <button
            type="submit"
            id="btn-login"
            class="btn btn-primary btn-block btn-lg"
            style="font-size: 1rem; font-weight: 700; letter-spacing: 0.02em"
          >
            Đăng nhập
          </button>
          <div
            id="login-error"
            style="display: none; margin-top: 12px; justify-content: center"
            class="form-error"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="m15 9-6 6" />
              <path d="m9 9 6 6" />
            </svg>
            <span></span>
          </div>
        </form>

        <div class="auth-footer">
          Chưa có tài khoản? <a href="/auth/register.html">Đăng ký ngay</a>
        </div>
      </div>
    </main>

    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/pages/auth-page.js"></script>
  </body>
</html>
