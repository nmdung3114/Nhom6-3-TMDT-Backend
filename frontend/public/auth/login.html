<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - ELearnVN</title>
  <link rel="stylesheet" href="/css/base/reset.css">
  <link rel="stylesheet" href="/css/base/variables.css">
  <link rel="stylesheet" href="/css/base/base.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/pages/auth/login.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <main class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="auth-logo__icon">🎓</div>
        <span class="auth-logo__text">ELearnVN</span>
      </a>
      <h1 class="auth-title">Chào mừng trở lại!</h1>
      <p class="auth-subtitle">Đăng nhập để tiếp tục hành trình học tập</p>

      <!-- Google Sign-In button rendered by GSI library -->
      <div id="google-signin-container" style="margin-bottom:4px;min-height:44px;display:flex;align-items:center;justify-content:center"></div>

      <button class="oauth-btn oauth-btn--facebook" id="btn-facebook-login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073C24 5.405 18.627 0 12 0 5.372 0 0 5.405 0 12.073c0 6.027 4.389 11.024 10.125 11.927V15.57H7.078v-3.497h3.047V9.43c0-3.025 1.793-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97H15.83c-1.491 0-1.956.93-1.956 1.886v2.25h3.328l-.532 3.497h-2.796v8.43C19.611 23.097 24 18.1 24 12.073z"/>
        </svg>
        Tiếp tục với Facebook
      </button>

      <div class="auth-divider">hoặc đăng nhập với email</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu <span class="required">*</span></label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input id="password" name="password" type="password" class="form-control has-right-icon" placeholder="••••••••" required>
            <span class="input-right-icon" id="toggle-password">👁</span>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
          <a href="#" style="font-size:0.85rem;color:var(--color-accent-light)">Quên mật khẩu?</a>
        </div>
        <button type="submit" id="btn-login" class="btn btn-primary btn-block btn-lg">Đăng nhập</button>
        <div id="login-error" style="display:none;margin-top:12px" class="form-error">❌ <span></span></div>
      </form>

      <div class="auth-footer">
        Chưa có tài khoản? <a href="/auth/register.html">Đăng ký ngay</a>
      </div>
      <div class="auth-footer" style="margin-top:8px;font-size:0.75rem;color:var(--color-text-muted)">
        Test: admin@elearning.vn / admin123 hoặc user@elearning.vn / user123
      </div>
    </div>
  </main>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/pages/auth-page.js"></script>
</body>
</html>
