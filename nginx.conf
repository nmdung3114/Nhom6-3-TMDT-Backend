server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API proxy → backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Static assets (css, js, assets) served from frontend root
    location ~* ^/(css|js|assets)/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML pages – map /path → /public/path
    location / {
        try_files /public$uri /public$uri/index.html /public/index.html;
    }

    error_page 404 /public/index.html;
    error_page 500 502 503 504 /public/index.html;
}
